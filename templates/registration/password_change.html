<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Change Password - IT Tech Organisation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0B1F3A 0%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-page {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .card-header {
            background: #0B1F3A;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .login-header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .login-logo {
            max-height: 50px;
            max-width: 100%;
            object-fit: contain;
        }
        .login-icon {
            font-size: 40px;
        }
        .login-org-name {
            font-size: 20px;
            font-weight: 600;
        }
        .login-subtitle {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }
        .card-body {
            padding: 30px;
        }
        .form-label {
            font-weight: 500;
            color: #333;
        }
        .input-group-text {
            background: #f8f9fa;
            border: 1px solid #ced4da;
            color: #0B1F3A;
        }
        .form-control:focus {
            border-color: #0B1F3A;
            box-shadow: 0 0 0 0.2rem rgba(11, 31, 58, 0.25);
        }
        .btn-primary {
            background: #0B1F3A;
            border-color: #0B1F3A;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #1a3a5c;
            border-color: #1a3a5c;
        }
        .alert-danger {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .forgot-link {
            color: #0B1F3A;
            text-decoration: none;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="card-header">
                <div class="login-header-content">
                    <i class="fas fa-key login-icon"></i>
                    <span class="login-org-name">Change Password</span>
                </div>
                <p class="login-subtitle">Update your password securely</p>
            </div>
            <div class="card-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                <form method="post" action="{% url 'password-change' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="current_password" class="form-control" placeholder="Enter current password" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-save"></i> Change Password
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'dashboard' %}" class="forgot-link">Cancel - Go to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
