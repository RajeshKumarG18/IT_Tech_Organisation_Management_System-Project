<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organisation ChatBot - IT Tech Organisation Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0B1F3A 0%, #1a2d4a 25%, #0B1F3A 50%, #1a2d4a 75%, #0B1F3A 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            min-height: 100vh;
            padding: 30px;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 0, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 107, 0, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        .chatbot-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            box-shadow: 0 15px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: botFloat 3s ease-in-out;
            position: relative;
            z-index: 1;
        }
        
        @keyframes botFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .chatbot-header {
            background: linear-gradient(135deg, #FF6B00, #FF8C33);
            padding: 30px;
            text-align: center;
            animation: headerPulse 2s ease-in-out infinite;
        }
        
        @keyframes headerPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(255, 107, 0, 0.4); }
            50% { box-shadow: 0 8px 30px rgba(255, 107, 0, 0.6); }
        }
        
        .chatbot-header h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .chatbot-header p {
            color: rgba(255, 255, 255, 0.9);
        }
        
        .chatbot-body {
            padding: 20px;
            background: #f0f4f8;
        }
        
        .response-box {
            padding: 20px;
            background: linear-gradient(135deg, #0B1F3A, #1a3a5c);
            border-radius: 12px;
            border: 2px solid #FF6B00;
            color: white;
            margin-bottom: 20px;
            animation: responseFade 0.5s ease-out;
        }
        
        @keyframes responseFade {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .response-box strong {
            color: #FF6B00;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 8px;
        }
        
        .response-box p {
            font-size: 1rem;
            line-height: 1.5;
            margin: 0;
        }
        
        .chatbot-input {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .chatbot-input input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        
        .chatbot-input input:focus {
            border-color: #FF6B00;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.2);
        }
        
        .chatbot-input button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #FF6B00, #FF8C33);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chatbot-input button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 107, 0, 0.4);
        }
        
        .topics-section {
            padding: 20px;
            background: #e8ecf1;
            border-top: 1px solid #ddd;
        }
        
        .topics-section h5 {
            color: #0B1F3A;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .topics-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .topic-tag {
            display: inline-block;
            padding: 10px 18px;
            background: white;
            border: 2px solid #FF6B00;
            border-radius: 25px;
            color: #0B1F3A;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .topic-tag:hover {
            background: #FF6B00;
            color: white;
            transform: scale(1.05);
        }
        
        .back-link {
            display: inline-block;
            padding: 10px 20px;
            margin: 20px;
            color: #FF6B00;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <a href="{% url 'dashboard' %}" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>
    
    <div class="chatbot-container">
        <div class="chatbot-header">
            <h1><i class="fas fa-robot"></i> Organisation ChatBot</h1>
            <p>IT Tech Organisation Management System Assistant</p>
        </div>
        
        <div class="chatbot-body">
            <div id="responseContainer" class="response-box" style="display: none;">
                <strong>Response:</strong>
                <p id="responseText"></p>
            </div>
            
            <form method="post" class="chatbot-input" id="chatbotForm">
                {% csrf_token %}
                <input type="text" name="message" id="chatbotMessage" placeholder="Ask me about employees, departments, projects, etc..." required autofocus>
                <button type="submit"><i class="fas fa-paper-plane"></i> Ask</button>
            </form>
        </div>
        
        <div class="topics-section">
            <h5><i class="fas fa-lightbulb"></i> Available Topics</h5>
            <div class="topics-list">
            {% for topic in chatbot_available_topics %}
            <span class="topic-tag" onclick="selectTopic('{{ topic|lower }}')">{{ topic|title }}</span>
            {% endfor %}
            </div>
        </div>
    </div>
    
    <script>
        function showResponse(responseText) {
            var container = document.getElementById('responseContainer');
            var text = document.getElementById('responseText');
            text.textContent = responseText;
            container.style.display = 'block';
            container.scrollIntoView({behavior: 'smooth', block: 'nearest'});
        }
        
        function getChatBotResponse(message) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/dashboard/chatbot/', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText);
                        showResponse(data.response);
                    } else {
                        showResponse('Error: Please try again.');
                    }
                }
            };
            xhr.onerror = function() {
                showResponse('Error: Could not connect to server.');
            };
            xhr.send(JSON.stringify({message: message}));
        }
        
        document.getElementById('chatbotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var message = document.getElementById('chatbotMessage').value;
            if (message && message.trim()) {
                getChatBotResponse(message);
                document.getElementById('chatbotMessage').value = '';
            }
        });
        
        function selectTopic(topic) {
            getChatBotResponse(topic);
        }
        
        document.getElementById('chatbotMessage').focus();
    </script>
</body>
</html>
