{% extends "admin/base.html" %}
{% load i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --primary: #FF6B00;
        --secondary: #0B1F3A;
    }
    
    /* Animated gradient background */
    body {
        background: linear-gradient(135deg, #0B1F3A 0%, #1a2d4a 25%, #0B1F3A 50%, #1a2d4a 75%, #0B1F3A 100%);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        overflow-y: auto;
    }
    
    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    
    /* Floating particles effect */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
            radial-gradient(circle at 20% 80%, rgba(255, 107, 0, 0.12) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(255, 107, 0, 0.08) 0%, transparent 50%),
            radial-gradient(circle at 50% 50%, rgba(255, 107, 0, 0.05) 0%, transparent 40%);
        pointer-events: none;
        z-index: 0;
    }
    
    /* Container styling */
    #container {
        background: rgba(255, 255, 255, 0.97);
        border-radius: 15px;
        margin: 20px auto;
        max-width: 95%;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.4);
        position: relative;
        z-index: 1;
        overflow: auto;
        animation: containerAppear 0.5s ease-out;
    }
    
    @keyframes containerAppear {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    /* Header */
    #header {
        background: linear-gradient(135deg, var(--primary), #FF8C33) !important;
        animation: headerGlow 3s ease infinite;
    }
    
    @keyframes headerGlow {
        0%, 100% { box-shadow: 0 4px 15px rgba(255, 107, 0, 0.4); }
        50% { box-shadow: 0 6px 25px rgba(255, 107, 0, 0.6); }
    }
    
    /* App modules */
    .app-list {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 20px;
        overflow-y: auto;
    }
    
    .app {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        min-width: 200px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        transition: all 0.3s;
        animation: appCard 0.5s ease-out backwards;
    }
    
    .app:nth-child(1) { animation-delay: 0.1s; }
    .app:nth-child(2) { animation-delay: 0.2s; }
    .app:nth-child(3) { animation-delay: 0.3s; }
    .app:nth-child(4) { animation-delay: 0.4s; }
    .app:nth-child(5) { animation-delay: 0.5s; }
    
    @keyframes appCard {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .app:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
    }
    
    .app h3 {
        color: var(--primary);
        border-bottom: 2px solid var(--primary);
        padding-bottom: 10px;
    }
    
    /* Table styling */
    #changelist {
        background: #fff;
        border-radius: 12px;
        overflow: auto;
        margin: 20px;
    }
    
    table {
        width: 100%;
        border-collapse: collapse;
    }
    
    thead {
        background: linear-gradient(135deg, var(--secondary), #1a2d4a);
        color: #fff;
    }
    
    th, td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #eee;
    }
    
    tr:hover {
        background: rgba(255, 107, 0, 0.05);
    }
    
    /* Form elements */
    input, select, textarea {
        border: 2px solid #ddd;
        border-radius: 8px;
        padding: 10px;
        transition: all 0.3s;
    }
    
    input:focus, select:focus, textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 10px rgba(255, 107, 0, 0.2);
    }
    
    input[type="submit"], button {
        background: linear-gradient(135deg, var(--primary), #FF8C33);
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    input[type="submit"]:hover, button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(255, 107, 0, 0.4);
    }
    
    /* Breadcrumbs */
    #breadcrumbs {
        background: #f8f9fa;
        padding: 12px 20px;
        color: #333;
    }
</style>
{% endblock %}
